name: CI

# Runs on every push and pull request. Fails the check if types, lint, or the
# production build break — so problems surface before Vercel deploys them.
on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Scrapers use playwright at runtime only; no need to download browsers in CI.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
